<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友魚勇者之路-單人版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgm" loop preload="auto">
        <source src="Below_the_Surface.mp3" type="audio/mpeg">
    </audio>

    <div id="music-control" onclick="toggleMusic()" style="position:fixed; top:10px; left:10px; z-index:2000; width:40px; height:40px; background:rgba(255,255,255,0.6); border-radius:50%; display:none; justify-content:center; align-items:center; font-size:20px; cursor:pointer;">
        🎵
    </div>

    <div id="log-modal">
        <div id="log-content">
            <div class="log-header">
                <span>出牌紀錄</span>
                <button onclick="closeLog()">關閉</button>
            </div>
            <div id="log-messages"></div>
        </div>
    </div>

	<div id="welcome-screen">
		<div class="welcome-container">

			<div class="game-title">
				友魚勇者之路
				<div class="subtitle">單人挑戰</div>
			</div>
			
			<div class="difficulty-select">
				<div class="diff-title">🎯 選擇難度</div>

				<div class="diff-options">
					<button class="sub-btnd" onclick="setDifficulty(0.4, this)">簡單</button>
					<button class="sub-btnd active" onclick="setDifficulty(0.7, this)">普通</button>
					<button class="sub-btnd" onclick="setDifficulty(0.9, this)">困難</button>
					
					
					
				</div>
			</div>

			<div class="menu-buttons">
				<button id="real-start-btn" onclick="initGame()">啟航冒險</button>

				<div class="sub-menu">
					<button class="sub-btn" onclick="openStory()">📖 故事</button>
					<button class="sub-btn" onclick="openInfo()">📘 說明</button>
				</div>
			</div>

		</div>

		<!-- 背景光點 -->
		<div class="mbubble"></div>
		<div class="mbubble"></div>
		<div class="mbubble"></div>

	</div>

    <div id="story-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:3000;">
        <img id="story-img" src="" style="width:100%; height:100%; object-fit: cover;">
        <div style="position:absolute; top:20px; right:20px; width:100%; display:flex; justify-content:right; gap:20px;">
            <button class="ctrl-btn" onclick="closeStory()">X</button>
        </div>
        <div id="story-page-num" style="position:absolute; top:20px; left:20px; color:white; background:rgba(0,0,0,0.2); padding:5px 10px; border-radius:20px;">1 / 6</div>
    </div>

    <div id="info-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:3000; justify-content:center; align-items:center;">
        <div style="background:white; width:85%; max-width:600px; max-height:80vh; padding:30px; border-radius:20px; position:relative; overflow-y:auto;">
            <h2 style="color:#00796b; margin-top:0;">遊戲說明</h2>
            <pre id="info-content" style="white-space:pre-wrap; font-size:1.1rem; line-height:1.6; color:#333; font-family:inherit;">載入中...</pre>
            <button onclick="closeInfo()" style="display:block; width:100%; margin-top:20px; padding:10px; background:#ffdfba; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">關閉</button>
        </div>
    </div>

    <div id="card-preview-overlay">
        <div id="card-preview-container"></div>
    </div>

    <div id="header">友魚勇者之路單人挑戰</div>

    <div class="char-area">
        <div id="ai-1" class="box"></div>
        <div id="ai-2" class="box"></div>
        <div id="ai-3" class="box"></div>
    </div>

    <div id="ocean">
        <div id="fish-layer"></div>
        <div id="bubbles"></div>
        <div id="deck-info">剩餘召喚卡: --</div>
		<div id="log-btn" onclick="openLog()">📜出牌記錄</div>
        <div id="summon-display">🔍尋找勇者...等待中...</div>
        <div id="table"></div>
    </div>

    <div id="player-zone">
        <div id="player-hand" class="hand"></div>
    </div>

    <script src="db.js"></script>
    <script src="main.js"></script>
	
	<div id="chat-layer"></div>

</body>
</html>
